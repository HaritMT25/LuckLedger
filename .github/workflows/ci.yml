name: CI

on:
  push:
    branches: [main, better-complete]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run full test suite
        run: mvn -B test

  e2e:
    name: Playwright e2e
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LUCKLEDGER_MASTER_PASSWORD: ci-e2e-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start application
        # -am builds the sibling modules in the same reactor: a fresh runner's ~/.m2 has no
        # luckledger artifacts, so plain -pl cannot resolve them.
        run: mvn -B -am -pl luckledger-app spring-boot:run > app.log 2>&1 &

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8080/api/health > /dev/null; then
              echo "App is up after ${i} attempts."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time." >&2
          tail -n 200 app.log >&2 || true
          exit 1

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run UI pass
        working-directory: e2e
        run: npm test

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-shots
          path: e2e/shots/
          if-no-files-found: ignore

      - name: Stop application
        if: always()
        run: pkill -f spring-boot:run || true
