<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckLedger — Scratch Card Awareness Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
    <div class="brand">
        <span class="logo">🎟️</span>
        <div>
            <h1>LuckLedger</h1>
            <p class="tagline">A gambling-awareness scratch card simulator — coins have no value.</p>
        </div>
    </div>
    <div id="player-bar" class="player-bar">
        <!-- populated by js/core.js (renderPlayerBar) -->
    </div>
</header>

<nav class="tabs">
    <a href="#dealer" data-route="dealer">Shops</a>
    <a href="#scratch" data-route="scratch">Scratch</a>
    <a href="#ledger" data-route="ledger">Ledger</a>
    <a href="#house" data-route="house" class="tab-house">🏛️ The House</a>
</nav>

<main id="view" class="view"></main>

<div id="toast" class="toast" hidden></div>

<footer class="footer">
    <p>Educational simulator. No real money, no payouts, no purchases. The house always wins — that's the point.</p>
</footer>

<script src="js/api.js"></script>
<script src="js/scratch.js"></script>
<script src="js/sounds.js"></script>
<!-- app.js was split into ordered classic scripts (shared global scope, no build step).
     Load order is load-bearing: core first, router last (it runs the bootstrap). -->
<script src="js/core.js"></script>
<script src="js/views/shops.js"></script>
<script src="js/views/play.js"></script>
<script src="js/views/story.js"></script>
<script src="js/views/house.js"></script>
<script src="js/views/campaigns.js"></script>
<script src="js/router.js"></script>
</body>
</html>
