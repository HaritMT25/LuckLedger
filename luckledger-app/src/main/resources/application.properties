# Flyway owns the schema; Hibernate only validates the entity mappings against it.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.open-in-view=false

# Datasource connection details are supplied at runtime by the Docker Compose support
# (see compose.yaml) for local dev, or by Testcontainers @ServiceConnection in tests.

# Master session cookie hardening. The session cookie is HttpOnly by default; SameSite=Lax blunts
# CSRF on top of the token check. cookie.secure stays off for plain-HTTP localhost — set it (and
# serve HTTPS) in any real deployment. The master account has NO committed default password: set
# LUCKLEDGER_MASTER_USERNAME / LUCKLEDGER_MASTER_PASSWORD, or the app mints and WARN-logs a one-time
# password at startup (see SecurityConfig).
server.servlet.session.cookie.same-site=lax

# Actuator probes for orchestration health checks. Expose ONLY health and info over HTTP (never env,
# beans, mappings, etc.), and enable the Kubernetes-style liveness/readiness groups under
# /actuator/health. /actuator/health is anonymous via SecurityConfig's anyRequest().permitAll();
# the app's own /api/health endpoint is untouched (the SPA and e2e suite use it).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Static SPA files must revalidate on every load. Without this, browsers heuristically cache
# app.js/api.js and serve a stale frontend against a newer backend after an upgrade — the classic
# "it broke after I pulled" report. The files are tiny; ETag revalidation keeps reloads cheap.
spring.web.resources.cache.cachecontrol.no-cache=true
